<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SK Media</title>
<script src='//libtl.com/sdk.js' data-zone='10831174' data-sdk='show_10831174'></script>
<style>
    body { background:#0f0f0f; color:white; font-family:Arial; margin:0; padding-bottom: 20px; }
    .header { background:#111; padding:15px; text-align:center; font-size:22px; font-weight:bold; border-bottom: 2px solid red; }
    .search { padding:15px; text-align:center; }
    .search input { width:85%; padding:12px; border-radius:20px; border:none; background:#222; color:white; }
    .movies { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:15px; padding:15px; }
    .movie { background:#1c1c1c; border-radius:10px; overflow:hidden; text-align:center; border:1px solid #333; }
    .movie img { width:100%; height:220px; object-fit:cover; }
    .movie h3 { font-size:14px; padding:8px 5px; margin:0; height:35px; overflow:hidden; }
    button { background:red; color:white; border:none; padding:10px; margin:10px; border-radius:5px; cursor:pointer; width:80%; font-weight:bold; }
    
    #adOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; flex-direction:column; align-items:center; justify-content:center; }
    .prog-bg { width:70%; background:#333; height:10px; border-radius:5px; margin:15px; }
    .prog-bar { width:0%; height:100%; background:red; border-radius:5px; transition:0.3s; }
</style>
</head>
<body>

<div class="header">🎬 SK Media Movies</div>
<div class="search"><input type="text" id="searchBox" placeholder="Search movies..." onkeyup="searchMovie()"></div>

<div id="adOverlay">
    <h2 id="adStatus">Unlocking Movie...</h2>
    <div class="prog-bg"><div class="prog-bar" id="pBar"></div></div>
    <p id="adCountText">Ads Seen: 0/5</p>
    <button onclick="playAd()" id="adBtn">Watch Ad</button>
</div>

<div class="movies" id="movies"></div>

<script>
let allMovies = [];
let adsSeen = 0;
let targetUrl = "";

fetch("/movies").then(res=>res.json()).then(data=>{ allMovies=data; showMovies(data); });

function showMovies(movies){
    let html="";
    movies.forEach(m=>{
        html+=`<div class="movie"><img src="${m.poster}"><h3>${m.title}</h3><button onclick="startUnlock('${m.link}')">Watch Now</button></div>`;
    });
    document.getElementById("movies").innerHTML = html || "<p>No movies found</p>";
}

function searchMovie(){
    let val = document.getElementById("searchBox").value.toLowerCase();
    showMovies(allMovies.filter(m=>m.title.toLowerCase().includes(val)));
}

function startUnlock(url){
    targetUrl = url; adsSeen = 0; updateUI();
    document.getElementById("adOverlay").style.display = "flex";
}

function playAd(){
    if(typeof show_10831174 === 'function'){
        document.getElementById("adBtn").innerText = "Loading...";
        show_10831174().then(()=>{
            adsSeen++; updateUI();
            document.getElementById("adBtn").innerText = "Watch Next Ad";
            if(adsSeen >= 5){
                document.getElementById("adStatus").innerText = "Unlocked! ✅";
                setTimeout(()=>{ window.open(targetUrl, "_blank"); document.getElementById("adOverlay").style.display="none"; }, 1000);
            }
        }).catch(()=>{ alert("Ad failed. Try again."); document.getElementById("adBtn").innerText = "Watch Ad"; });
    }
}

function updateUI(){
    document.getElementById("pBar").style.width = (adsSeen/5)*100 + "%";
    document.getElementById("adCountText").innerText = `Ads Seen: ${adsSeen}/5`;
}
</script>
</body>
  </html>
